<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💌 约会邀请</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Dodging button container must have proper positioning */
    .button-row {
      position: relative;
      min-height: 120px;
      padding: 10px 0;
    }
    .btn-reject {
      position: absolute; right: 0; top: 0;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="floating-hearts">
    <span>🌸</span><span>✨</span><span>💖</span><span>🌷</span><span>💕</span>
  </div>

  <div class="invite-page">
    <div class="invitation-container">
      <!-- Step 1: Invitation Card -->
      <div id="step-invitation" class="invitation-card">
        <div class="invitation-emoji">💌</div>
        <h1 id="inviteTitle">约会请求</h1>
        <div class="subtitle" id="inviteSubtitle">你有一封甜蜜的邀请函 💕</div>
        <div class="message" id="inviteMessage">加载中…</div>
        <div class="from" id="inviteFrom">— 来自你的他</div>

        <div class="button-row" id="buttonRow">
          <button class="btn-accept" id="btnAccept" onclick="acceptInvitation()">❤️ 接受</button>
          <button class="btn-reject" id="btnReject">💔 拒绝</button>
        </div>
      </div>

      <!-- Step 2: Selection Form -->
      <div id="step-form" class="hidden w-full" style="max-width:400px;">
        <div class="card selection-form">
          <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:2.5rem;">🎉</div>
            <h2 style="font-family:var(--font-heading);color:var(--pink);font-size:1.3rem;margin-top:8px;">太棒了！选个好日子吧 💕</h2>
          </div>

          <!-- Date -->
          <div class="form-section">
            <h3>📅 选个好日子</h3>
            <div class="hint">你想哪一天去？</div>
            <div class="option-grid" id="dateOptions"></div>
          </div>

          <!-- Time -->
          <div class="form-section">
            <h3>🕐 什么时间段？</h3>
            <div class="hint">你更喜欢什么时候？</div>
            <div class="option-grid" id="timeOptions"></div>
          </div>

          <!-- Activity -->
          <div class="form-section">
            <h3>🎯 想做什么？</h3>
            <div class="hint">我们一起…</div>
            <div class="option-grid" id="activityOptions"></div>
          </div>

          <!-- Food -->
          <div class="form-section">
            <h3>🍽️ 想吃啥？</h3>
            <div class="hint">美食时间到～</div>
            <div class="option-grid" id="foodOptions"></div>
          </div>

          <!-- Note -->
          <div class="form-section">
            <h3>💌 还想补充什么？</h3>
            <div class="hint">写一句你想说的话吧 ♡</div>
            <textarea class="input-field" id="herNote" placeholder="例如：我想去看海～" rows="3"></textarea>
          </div>

          <button class="btn btn-primary btn-submit" onclick="submitChoices()">
            💕 就这么定了！
          </button>
        </div>
      </div>

      <!-- Step 3: Thank You -->
      <div id="step-thankyou" class="hidden w-full" style="max-width:400px;">
        <div class="card thankyou-section">
          <div class="big-emoji">💕</div>
          <h2>太好啦！期待那一天～</h2>
          <p>你的选择已经发送给他了 ♡</p>
          <div style="margin-top:24px;font-size:0.9rem;color:var(--brown-lighter);">
            <span id="summaryDate"></span><br>
            <span id="summaryTime"></span><br>
            <span id="summaryActivity"></span><br>
            <span id="summaryFood"></span>
          </div>
          <div id="summaryNote" style="margin-top:12px;padding:12px;background:var(--cream);border-radius:var(--radius-sm);font-size:0.9rem;color:var(--brown);"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <div id="loadingOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#FFF8F0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s;">
  <div style="font-size:3rem;animation:heartBeat 1s ease-in-out infinite;">💕</div>
  <p style="margin-top:16px;font-family:PingFang SC, Microsoft YaHei, sans-serif;color:#8D6E63;">加载中…</p>
</div>
<script src="js/github-config.js"></script>
<script src="js/app.js"></script>
<script>
window.addEventListener("load", function() {
  setTimeout(function() {
    var el = document.getElementById("loadingOverlay");
    if (el) { el.style.opacity = "0"; setTimeout(function() { el.remove(); }, 500); }
  }, 300);
});
</script>

  <script>
    let dateData = null;
    let selectedDate = null;
    let selectedTime = null;
    let selectedActivity = null;
    let selectedFood = null;
    let dodgeCount = 0;
    let unlisten = null;

    const DODGE_MESSAGES = [
      "别跑～点接受嘛 💕",
      "你抓不到我～ 😝",
      "就接受吧～ ❤️",
      "嘿嘿，点左边那个～ 💕",
      "认命吧～ 🥰",
      "别逃啦～ 接受吧！ 💖",
      "你逃不掉的～ ❤️",
      "好啦好啦，不逗你了～ 😘"
    ];

    // ======== Load Date Config ========
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const dateId = params.get("id");

      if (!dateId) {
        document.getElementById("inviteMessage").textContent = "啊哦～这个邀请链接好像不对 😢";
        document.getElementById("btnAccept").disabled = true;
        return;
      }

      // Listen for real-time updates
      unlisten = pollDateConfig(dateId, (data) => {
        if (!data) {
          document.getElementById("inviteMessage").textContent = "这个约会好像不见了 😢";
          return;
        }
        dateData = data;

        // Check if already submitted
        if (data.response) {
          showThankYou(data.response, data.config);
          return;
        }

        renderInvitation(data.config);
        renderOptions(data.config);
      });
    }

    function renderInvitation(config) {
      document.getElementById("inviteMessage").textContent = config.inviteMessage || "我们约会吧～";
      document.getElementById("inviteFrom").textContent = `— 来自 ${config.yourName || "你的他"}`;
      document.getElementById("inviteSubtitle").textContent = `${config.herName || "亲爱的"}，你有一封甜蜜的邀请函 💕`;
    }

    function renderOptions(config) {
      // Dates
      const dateContainer = document.getElementById("dateOptions");
      dateContainer.innerHTML = (config.dates || []).map(d =>
        `<div class="option-card" data-value="${escapeHtml(d)}" onclick="selectOption(this, 'date')">${escapeHtml(d)}</div>`
      ).join("");

      // Times
      const timeContainer = document.getElementById("timeOptions");
      timeContainer.innerHTML = (config.times || []).map(t =>
        `<div class="option-card" data-value="${escapeHtml(t)}" onclick="selectOption(this, 'time')">${escapeHtml(t)}</div>`
      ).join("");

      // Activities
      const activityContainer = document.getElementById("activityOptions");
      activityContainer.innerHTML = (config.activities || []).map(a =>
        `<div class="option-card" data-value="${escapeHtml(a)}" onclick="selectOption(this, 'activity')">${escapeHtml(a)}</div>`
      ).join("");

      // Foods
      const foodContainer = document.getElementById("foodOptions");
      foodContainer.innerHTML = (config.foods || []).map(f =>
        `<div class="option-card" data-value="${escapeHtml(f)}" onclick="selectOption(this, 'food')">${escapeHtml(f)}</div>`
      ).join("");
    }

    function selectOption(el, type) {
      // Deselect siblings
      el.parentElement.querySelectorAll(".option-card").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");

      const value = el.dataset.value;
      if (type === "date") selectedDate = value;
      else if (type === "time") selectedTime = value;
      else if (type === "activity") selectedActivity = value;
      else if (type === "food") selectedFood = value;
    }

    // ======== Acceptance Flow ========
    function acceptInvitation() {
      document.getElementById("step-invitation").classList.add("hidden");
      document.getElementById("step-form").classList.remove("hidden");
      document.getElementById("step-form").scrollIntoView({ behavior: "smooth" });
    }

    async function submitChoices() {
      if (!selectedDate) { alert("选个日子吧 💕"); return; }
      if (!selectedTime) { alert("选个时间段吧 💕"); return; }
      if (!selectedActivity) { alert("选个约会项目吧 💕"); return; }
      if (!selectedFood) { alert("选个吃的吧 💕"); return; }

      const params = new URLSearchParams(window.location.search);
      const dateId = params.get("id");
      const note = document.getElementById("herNote").value.trim();

      try {
        await submitResponse(dateId, {
          selectedDate,
          selectedTime,
          selectedActivity,
          selectedFood,
          note
        });

        if (unlisten) unlisten();
        showThankYou({
          selectedDate,
          selectedTime,
          selectedActivity,
          selectedFood,
          note
        }, dateData.config);
        launchConfetti();
      } catch (err) {
        alert("提交失败了 😢 " + err.message);
      }
    }

    function showThankYou(response, config) {
      document.getElementById("step-invitation").classList.add("hidden");
      document.getElementById("step-form").classList.add("hidden");
      document.getElementById("step-thankyou").classList.remove("hidden");

      document.getElementById("summaryDate").textContent = `📅 ${response.selectedDate}`;
      document.getElementById("summaryTime").textContent = `🕐 ${response.selectedTime}`;
      document.getElementById("summaryActivity").textContent = `🎯 ${response.selectedActivity}`;
      document.getElementById("summaryFood").textContent = `🍽️ ${response.selectedFood}`;

      const noteEl = document.getElementById("summaryNote");
      if (response.note) {
        noteEl.textContent = `💌 "${response.note}"`;
        noteEl.classList.remove("hidden");
      } else {
        noteEl.classList.add("hidden");
      }
    }

    // ======== Confetti ========
    function launchConfetti() {
      const colors = ["var(--pink)", "var(--blue)", "var(--peach)", "var(--mint)", "#FF6B81", "#FFD700"];
      for (let i = 0; i < 30; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = Math.random() * 100 + "%";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        piece.style.width = (Math.random() * 8 + 4) + "px";
        piece.style.height = (Math.random() * 8 + 4) + "px";
        piece.style.animationDuration = (Math.random() * 2 + 3) + "s";
        piece.style.animationDelay = (Math.random() * 0.5) + "s";
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5000);
      }
    }

    // ======== Dodging Button ========
    function dodgeReject() {
      const btn = document.getElementById("btnReject");
      const row = document.getElementById("buttonRow");
      if (!btn || !row) return;

      const rowRect = row.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();

      // Make sure button is absolutely positioned relative to row
      btn.style.position = "absolute";

      // Calculate available space
      const maxX = rowRect.width - btnRect.width;
      const maxY = rowRect.height - btnRect.height;

      // Random position
      let newX = Math.random() * Math.max(maxX, 0);
      let newY = Math.random() * Math.max(maxY, 0);

      btn.style.left = newX + "px";
      btn.style.top = newY + "px";

      dodgeCount++;

      // Show a playful message after a few dodges
      if (dodgeCount <= 8) {
        showDodgeMessage(DODGE_MESSAGES[dodgeCount - 1]);
      } else if (dodgeCount < 12) {
        showDodgeMessage(DODGE_MESSAGES[7]);
      }

      // After many attempts, make it really dramatic
      if (dodgeCount > 10) {
        btn.style.transform = "scale(0.8) rotate(5deg)";
      }
    }

    function showDodgeMessage(text) {
      // Remove existing dodge messages
      document.querySelectorAll(".dodge-message").forEach(el => el.remove());

      const msg = document.createElement("div");
      msg.className = "dodge-message";
      msg.textContent = text;
      document.getElementById("buttonRow").appendChild(msg);

      // Auto remove after 2 seconds
      setTimeout(() => {
        if (msg.parentElement) msg.remove();
      }, 2000);
    }

    // Initial position for reject button
    function positionRejectBtn() {
      const btn = document.getElementById("btnReject");
      const row = document.getElementById("buttonRow");
      if (!btn || !row) return;

      btn.style.position = "absolute";
      btn.style.left = "auto";
      btn.style.right = "0";
      btn.style.top = "0";
    }

    // Bind dodge events
    document.addEventListener("DOMContentLoaded", () => {
      positionRejectBtn();
      init();

      const btn = document.getElementById("btnReject");
      if (btn) {
        // For desktop: mouse enter
        btn.addEventListener("mouseenter", dodgeReject);
        // For mobile: touch start
        btn.addEventListener("touchstart", (e) => {
          e.preventDefault();
          dodgeReject();
        });
        // Click (just in case)
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          dodgeReject();
        });
      }
    });

    function escapeHtml(text) {
      if (!text) return "";
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // Re-position on resize
    window.addEventListener("resize", positionRejectBtn);
  </script>
</body>
</html>
